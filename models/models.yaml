# ── Manifiesto declarativo de modelos ─────────────────────────────────────────
# Edita SOLO este archivo para añadir/quitar pesos. `scripts/40_models.py` descarga
# lo que falte (idempotente: salta lo que ya existe). Los pesos NO se versionan.
#
# Cada entrada:
#   dest:   nombre del archivo destino (se guarda en el subdir correcto de ComfyUI)
#   source: civitai | huggingface | url
#   # según source:
#   id:     civitai versionId           (source: civitai)
#   repo:   org/nombre                   (source: huggingface)
#   path:   ruta/dentro/del/repo.safetensors   (source: huggingface)
#   rev:    rama/tag/commit (default main)     (source: huggingface, opcional)
#   url:    URL directa de descarga      (source: url)
#
# Tipos soportados → subdir de ComfyUI:
#   checkpoints → models/checkpoints      loras       → models/loras
#   vae         → models/vae              controlnet  → models/controlnet
#   upscale_models → models/upscale_models  embeddings → models/embeddings
# ──────────────────────────────────────────────────────────────────────────────

checkpoints:
  # WAI-illustrious-SDXL v17.0 (Civitai 827184 / versionId 2883731). Base: Illustrious.
  - dest: waiIllustriousSDXL_v170.safetensors
    source: civitai
    id: 2883731

  # RedFuku (chatpig/redfuku en HuggingFace). Base: SDXL estilo Pony (usa tags score_9/source_anime).
  # Es el fp16 TODO-EN-UNO (7.1 GB) → carga con CheckpointLoaderSimple. Repo público (sin token).
  # Nota: el repo también trae clip/vae sueltos y GGUF; NO los necesitamos (este .safetensors es completo).
  # - dest: redfuku.safetensors
  #   source: huggingface
  #   repo: chatpig/redfuku
  #   path: redfuku_202510_fp16.safetensors

loras:
  # Yuki Suou — para RedFuku / cualquier checkpoint Pony.
  # Civitai model 570729 "Season 1 (V2)" / versionId 931920 (217.9MB, 124 likes) — reemplaza
  # a un primer intento (versionId 723900, 55MB, sin trigger word, daba OTRO personaje).
  # Trigger words (agregar al prompt): "long hair, brown hair, purple eyes, blazer,
  # pleated skirt, long sleeves"
  # - dest: yuki_suou_pony.safetensors
  #   source: civitai
  #   id: 931920

  # Yuki Suou — para WAI-illustrious / checkpoints Illustrious (Civitai 1385055 / versionId 1565125,
  # creador nochekaiser881, "anime s1").
  # Trigger words: "yuki suou, long hair, bangs, brown hair, black hair, hair between eyes,
  # purple eyes, half updo, mature female, small breasts, anime screencap" + (opcional, uniforme)
  # "shirt, bow, school uniform, jacket, white shirt, collared shirt, bowtie, red bow, blazer,
  # red bowtie, black skirt, pleated skirt,"
  # - dest: yuki_suou_illustrious.safetensors
  #   source: civitai
  #   id: 1565125

  # Anna Yanami (Makeine: Too Many Losing Heroines!) — Civitai model 607474, creador soralz.
  # Mismo LoRA que en SeaArt (mismo nombre de archivo exacto, mismo creador) — SeaArt no
  # permitia descarga directa, este es el original re-publicado en Civitai.
  # Para WAI-illustrious / checkpoints Illustrious. versionId 1311670 "ixl-v1.0".
  # Trigger: "anna yanami (makeine), blue hair, medium hair, ahoge, blue eyes"
  # Outfits (agregar al prompt junto al trigger): school uniform / winter school uniform /
  # swimsuit / ghost costume / outing — ver docs/models.md para el detalle de cada uno.
  - dest: anna_yanami_illustrious.safetensors
    source: civitai
    id: 1311670

  # Anna Yanami — para RedFuku / checkpoints Pony. Mismo model 607474, versionId 914046 "v4.0".
  # Trigger: "anna yanami, blue hair, medium hair, ahoge, blue eyes" (sin "(makeine)").
  - dest: anna_yanami_pony.safetensors
    source: civitai
    id: 914046

vae: []

controlnet: []

upscale_models: []

embeddings: []
